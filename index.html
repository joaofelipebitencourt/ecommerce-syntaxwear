<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntaxWear - Tênis e Sneakers Online</title>

    <!-- CSS Files -->
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./css/components/header.css">
    <link rel="stylesheet" href="./css/components/hero.css">
</head>

<body>
    <!-- Cabeçalho / Header -->
    <header class="header">
        <!-- Elementos do cabeçalho como logo, navegação e ícones -->

        <h1 class="logo">
            <a href="/" title="SyntaxWear - Tênis e Sneakers Online">
                <img src="/images/logo/logo.svg" alt="SyntaxWear - Tênis e Sneakers Online">
            </a>
        </h1>

        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>
        </nav>

        <nav class="nav-right" aria-label="Acesso Rápido">
            <ul>
                <li><a href="#">Nossas Lojas</a></li>
                <li><a href="#">Sobre</a></li>
                <li>
                    <a href="#" aria-label="Minha Conta">
                        <img src="./images/icons/user.svg" alt="Minha Conta">
                    </a>
                </li>
                <li>
                    <a href="#" aria-label="Ajuda">
                        <img src="./images/icons/help.svg" alt="Ajuda">
                    </a>
                </li>
                <li>
                    <a href="#" aria-label="Carrinho">
                        <img src="./images/icons/bag.svg" alt="Carrinho">
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Conteúdo Principal -->
    <main>
        <!-- Seção de Banner Principal (Hero) -->
        <section class="hero-section">
            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-subtitle">Krypton One</span>
                    <h2 class="hero-title">Transforme qualquer passo em presença</h2>
                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#">Ver modelos</a>
                        <a class="btn btn-filled" href="#">Comprar</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- Seção de Destaques (Highlights) -->
        <section class="highlights">
        </section>

        <!-- Seção de Produtos (Products) -->
        <section class="products">
        </section>
    </main>

    <!-- Rodapé / Footer -->
    <footer class="footer">
        <!-- Informações institucionais e links de rodapé -->
    </footer>
</body>

</html>
